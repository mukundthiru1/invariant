[package]
name = "invariant-engine"
version = "0.1.0"
edition = "2024"
description = "INVARIANT — Zero-dependency security detection engine"
license = "MIT"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
regex = { version = "1", default-features = false, features = ["std", "perf", "unicode-perl", "unicode-case"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
wasm-bindgen = { version = "0.2", optional = true }

[dev-dependencies]
criterion = "0.5"

[features]
default = []
wasm = ["dep:wasm-bindgen"]

[profile.release]
opt-level = "z"      # Optimize for size (CF Worker binary budget)
lto = true
codegen-units = 1
strip = true
panic = "abort"
