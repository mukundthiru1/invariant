<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVARIANT — Defense Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08080A;
            --bg-elevated: #0F0F12;
            --bg-card: #111116;
            --bg-card-hover: #171720;
            --bg-inset: #0C0C10;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --text: rgba(255,255,255,0.9);
            --text-dim: rgba(255,255,255,0.55);
            --text-muted: rgba(255,255,255,0.3);
            --accent: #F5A623;
            --accent-dim: rgba(245,166,35,0.12);
            --critical: #FF4444;
            --critical-dim: rgba(255,68,68,0.1);
            --high: #FF8C00;
            --high-dim: rgba(255,140,0,0.1);
            --medium: #FFD700;
            --medium-dim: rgba(255,215,0,0.1);
            --low: #4FC3F7;
            --low-dim: rgba(79,195,247,0.1);
            --success: #4CAF50;
            --success-dim: rgba(76,175,80,0.1);
            --novel: #E040FB;
            --novel-dim: rgba(224,64,251,0.1);
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Inter', -apple-system, sans-serif;
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Header ──────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            border-bottom: 1px solid var(--border);
            background: rgba(8,8,10,0.97);
            backdrop-filter: blur(24px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left { display: flex; align-items: center; gap: 14px; }
        .logo { font-size: 13px; font-weight: 700; letter-spacing: 0.18em; color: var(--text); }
        .version { font-size: 10px; color: var(--text-muted); font-family: var(--mono); }

        .mode-badge {
            font-family: var(--mono);
            font-size: 10px;
            padding: 3px 10px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 500;
        }
        .mode-observe { background: rgba(79,195,247,0.12); color: #4FC3F7; border: 1px solid rgba(79,195,247,0.2); }
        .mode-sanitize { background: var(--medium-dim); color: var(--medium); border: 1px solid rgba(255,215,0,0.2); }
        .mode-defend { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(245,166,35,0.2); }
        .mode-lockdown { background: var(--critical-dim); color: var(--critical); border: 1px solid rgba(255,68,68,0.2); }

        .header-right { display: flex; align-items: center; gap: 14px; }
        .last-update { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }

        .btn {
            background: none; border: 1px solid var(--border); color: var(--text-dim);
            padding: 5px 12px; border-radius: var(--radius-sm); font-size: 11px;
            cursor: pointer; transition: all 0.15s; font-family: var(--sans); font-weight: 500;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

        /* ── Tabs ─────────────────────────────────────── */
        .tabs {
            display: flex; gap: 0; border-bottom: 1px solid var(--border);
            background: var(--bg-elevated); padding: 0 28px;
        }
        .tab {
            padding: 10px 18px; font-size: 12px; color: var(--text-muted);
            cursor: pointer; border-bottom: 2px solid transparent;
            transition: all 0.15s; font-weight: 500; letter-spacing: 0.02em;
        }
        .tab:hover { color: var(--text-dim); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        /* ── Layout ──────────────────────────────────── */
        .container { max-width: 1440px; margin: 0 auto; padding: 20px 28px; }
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Posture Row ─────────────────────────────── */
        .posture-row { display: grid; grid-template-columns: 180px 1fr; gap: 16px; margin-bottom: 20px; }

        .grade-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }
        .grade-card::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, var(--grade-glow, transparent) 0%, transparent 70%);
            opacity: 0.15;
        }
        .grade-letter { font-size: 64px; font-weight: 700; line-height: 1; position: relative; }
        .grade-score { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-family: var(--mono); position: relative; }
        .grade-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.1em; position: relative; }

        .grade-A { color: var(--success); --grade-glow: var(--success); }
        .grade-B { color: #8BC34A; --grade-glow: #8BC34A; }
        .grade-C { color: var(--medium); --grade-glow: var(--medium); }
        .grade-D { color: var(--high); --grade-glow: var(--high); }
        .grade-F { color: var(--critical); --grade-glow: var(--critical); }

        .stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

        .stat-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px;
            transition: all 0.15s; position: relative; overflow: hidden;
        }
        .stat-card:hover { border-color: var(--border-hover); transform: translateY(-1px); }
        .stat-card::after {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
        }
        .stat-value { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
        .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.05em; }

        .severity-critical .stat-value { color: var(--critical); }
        .severity-critical::after { background: var(--critical); }
        .severity-high .stat-value { color: var(--high); }
        .severity-high::after { background: var(--high); }
        .severity-blocked .stat-value { color: var(--accent); }
        .severity-blocked::after { background: var(--accent); }
        .severity-novel .stat-value { color: var(--novel); }
        .severity-novel::after { background: var(--novel); }
        .severity-total .stat-value { color: var(--text); }
        .severity-total::after { background: var(--text-muted); }

        /* ── Timeline Chart ──────────────────────────── */
        .chart-card {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); padding: 16px; margin-bottom: 16px;
        }
        .chart-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;
        }
        .chart-title { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.05em; }
        .chart-legend { display: flex; gap: 16px; }
        .legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-muted); }
        .legend-dot { width: 6px; height: 6px; border-radius: 50%; }

        .timeline-chart {
            display: flex; align-items: flex-end; gap: 2px; height: 100px;
            padding-top: 8px;
        }
        .timeline-bar {
            flex: 1; min-width: 8px; border-radius: 2px 2px 0 0;
            transition: all 0.2s; cursor: pointer; position: relative;
        }
        .timeline-bar:hover { opacity: 0.8; }
        .bar-blocked { background: var(--critical); }
        .bar-monitored { background: rgba(79,195,247,0.3); }
        .bar-novel { background: var(--novel); }

        /* ── Distribution ────────────────────────────── */
        .dist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .dist-bar-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .dist-label { font-size: 11px; font-family: var(--mono); color: var(--text-dim); width: 140px; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .dist-bar { height: 6px; border-radius: 3px; background: var(--accent); transition: width 0.3s; }
        .dist-count { font-size: 10px; font-family: var(--mono); color: var(--text-muted); min-width: 30px; text-align: right; }

        /* ── Tables ──────────────────────────────────── */
        .section { margin-bottom: 24px; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .section-title { font-size: 12px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.05em; text-transform: uppercase; }
        .section-count { font-family: var(--mono); font-size: 11px; color: var(--text-muted); }

        .table-wrap {
            background: var(--bg-card); border: 1px solid var(--border);
            border-radius: var(--radius); overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left; padding: 10px 14px; font-size: 10px; font-weight: 500;
            color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
            border-bottom: 1px solid var(--border); background: var(--bg-inset);
        }
        td { padding: 8px 14px; font-size: 12px; border-bottom: 1px solid var(--border); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--bg-card-hover); }

        .severity-badge {
            font-family: var(--mono); font-size: 10px; padding: 2px 7px;
            border-radius: 3px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
        }
        .badge-critical { background: var(--critical-dim); color: var(--critical); }
        .badge-high { background: var(--high-dim); color: var(--high); }
        .badge-medium { background: var(--medium-dim); color: var(--medium); }
        .badge-low { background: var(--low-dim); color: var(--low); }
        .badge-info { background: rgba(255,255,255,0.04); color: var(--text-muted); }

        .action-badge { font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 3px; font-weight: 500; }
        .action-blocked { background: var(--critical-dim); color: var(--critical); }
        .action-sanitized { background: var(--medium-dim); color: var(--medium); }
        .action-normalized { background: var(--medium-dim); color: var(--medium); }
        .action-monitored { background: var(--low-dim); color: var(--low); }
        .action-passed { background: rgba(255,255,255,0.04); color: var(--text-muted); }

        .mono { font-family: var(--mono); font-size: 11px; color: var(--text-dim); }
        .truncate { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 13px; }
        .empty-icon { font-size: 28px; margin-bottom: 10px; opacity: 0.25; }

        .loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; flex-direction: column; gap: 16px; }
        .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 1100px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 900px) {
            .posture-row { grid-template-columns: 1fr; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .dist-grid { grid-template-columns: 1fr; }
            .container { padding: 12px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">
            <div class="spinner"></div>
            <div style="color: var(--text-muted); font-size: 12px;">Connecting to INVARIANT agent...</div>
        </div>
    </div>

    <script>
    const API = window.location.origin + '/api';
    let state = { status: null, findings: [], signals: [], timeline: [], topPaths: [], distribution: [], postureHistory: [] };
    let activeTab = 'overview';

    // SECURITY: HTML escape function to prevent XSS
    function escapeHtml(text) {
        if (text === null || text === undefined) return '';
        const str = String(text);
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    async function fetchAll() {
        try {
            const [statusR, findingsR, signalsR, timelineR, pathsR, distR, postureR] = await Promise.allSettled([
                fetch(`${API}/status`).then(r => r.json()),
                fetch(`${API}/findings?limit=100`).then(r => r.json()),
                fetch(`${API}/signals?limit=100`).then(r => r.json()),
                fetch(`${API}/signals/timeline?hours=24`).then(r => r.json()),
                fetch(`${API}/signals/top-paths?limit=15`).then(r => r.json()),
                fetch(`${API}/signals/distribution`).then(r => r.json()),
                fetch(`${API}/posture/history?limit=14`).then(r => r.json()),
            ]);
            state.status = statusR.status === 'fulfilled' ? statusR.value : null;
            state.findings = findingsR.status === 'fulfilled' ? findingsR.value : [];
            state.signals = signalsR.status === 'fulfilled' ? signalsR.value : [];
            state.timeline = timelineR.status === 'fulfilled' ? timelineR.value : [];
            state.topPaths = pathsR.status === 'fulfilled' ? pathsR.value : [];
            state.distribution = distR.status === 'fulfilled' ? distR.value : [];
            state.postureHistory = postureR.status === 'fulfilled' ? postureR.value : [];
        } catch (e) { console.error('Fetch error:', e); }
        render();
    }

    function sev(s) { const e = escapeHtml(s); return `<span class="severity-badge badge-${e}">${e}</span>`; }
    function act(a) { const e = escapeHtml(a); return `<span class="action-badge action-${e}">${e}</span>`; }
    function ago(ts) {
        if (!ts) return '—';
        const d = Date.now() - new Date(ts).getTime();
        if (d < 60000) return 'now';
        if (d < 3600000) return `${Math.floor(d/60000)}m`;
        if (d < 86400000) return `${Math.floor(d/3600000)}h`;
        return `${Math.floor(d/86400000)}d`;
    }

    function renderTimeline(data) {
        if (!data || data.length === 0) return '<div class="empty"><div class="empty-icon">◇</div>No signal data yet</div>';
        const max = Math.max(...data.map(d => d.total), 1);
        return `<div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Signal Timeline (24h)</span>
                <div class="chart-legend">
                    <div class="legend-item"><div class="legend-dot" style="background:var(--low)"></div>Monitored</div>
                    <div class="legend-item"><div class="legend-dot" style="background:var(--critical)"></div>Blocked</div>
                    <div class="legend-item"><div class="legend-dot" style="background:var(--novel)"></div>Novel</div>
                </div>
            </div>
            <div class="timeline-chart">${data.map(d => {
                const h = Math.max(2, (d.total / max) * 90);
                const bh = Math.max(0, (d.blocked / max) * 90);
                const hour = escapeHtml((d.hour.split('T')[1]?.slice(0,5) || ''));
                return `<div style="flex:1;display:flex;flex-direction:column;align-items:stretch;gap:1px;height:100px;justify-content:flex-end" title="${hour}: ${d.total} total, ${d.blocked} blocked">
                    <div class="bar-monitored" style="height:${h - bh}px;border-radius:2px 2px 0 0"></div>
                    ${bh > 0 ? `<div class="bar-blocked" style="height:${bh}px"></div>` : ''}
                </div>`;
            }).join('')}</div>
        </div>`;
    }

    function renderDistribution(data, topPaths) {
        const maxD = Math.max(...(data || []).map(d => d.count), 1);
        const maxP = Math.max(...(topPaths || []).map(d => d.count), 1);
        return `<div class="dist-grid">
            <div class="chart-card">
                <div class="chart-title" style="margin-bottom:12px">Invariant Classes</div>
                ${(data || []).slice(0, 10).map(d => `
                    <div class="dist-bar-wrap">
                        <div class="dist-label">${escapeHtml(d.type)}</div>
                        <div style="flex:1"><div class="dist-bar" style="width:${(d.count/maxD)*100}%"></div></div>
                        <div class="dist-count">${d.count}</div>
                    </div>
                `).join('') || '<div class="empty" style="padding:20px">No data</div>'}
            </div>
            <div class="chart-card">
                <div class="chart-title" style="margin-bottom:12px">Top Attacked Paths</div>
                ${(topPaths || []).slice(0, 10).map(d => `
                    <div class="dist-bar-wrap">
                        <div class="dist-label" title="${escapeHtml(d.path)}">${escapeHtml(d.path)}</div>
                        <div style="flex:1"><div class="dist-bar" style="width:${(d.count/maxP)*100}%;background:${d.blocked > 0 ? 'var(--critical)' : 'var(--low)'}"></div></div>
                        <div class="dist-count">${d.count}</div>
                    </div>
                `).join('') || '<div class="empty" style="padding:20px">No data</div>'}
            </div>
        </div>`;
    }

    function renderFindings(findings) {
        if (!findings || findings.length === 0)
            return '<div class="empty"><div class="empty-icon">✓</div>No findings. Run a scan or wait for detection.</div>';
        return findings.map(f => `<tr>
            <td>${sev(f.severity)}</td>
            <td style="max-width:350px">${escapeHtml(f.title)}</td>
            <td class="mono truncate">${escapeHtml(f.location) || '—'}</td>
            <td class="mono">${escapeHtml(f.type)}</td>
            <td class="mono">${f.rasp_active ? '🛡️' : '—'}</td>
            <td><span class="mono" style="color:${f.status === 'open' ? 'var(--accent)' : 'var(--success)'}">${escapeHtml(f.status)}</span></td>
            <td class="mono">${ago(f.last_seen)}</td>
        </tr>`).join('');
    }

    function renderSignals(signals) {
        if (!signals || signals.length === 0)
            return '<tr><td colspan="7"><div class="empty"><div class="empty-icon">◇</div>No signals recorded yet</div></td></tr>';
        return signals.map(s => `<tr>
            <td>${sev(s.severity)}</td>
            <td>${act(s.action)}</td>
            <td class="mono">${escapeHtml(s.type)}${s.subtype ? `<span style="color:var(--text-muted)">/${escapeHtml(s.subtype)}</span>` : ''}</td>
            <td class="mono truncate">${escapeHtml(s.path)}</td>
            <td class="mono">${escapeHtml(s.method)}</td>
            <td>${s.is_novel ? '<span style="color:var(--novel)">✦</span>' : '<span style="color:var(--text-muted)">—</span>'}</td>
            <td class="mono">${ago(s.timestamp)}</td>
        </tr>`).join('');
    }

    function render() {
        const s = state.status;
        if (!s) {
            document.getElementById('app').innerHTML = `<div class="loading"><div class="spinner"></div><div style="color:var(--text-muted);font-size:12px">Connecting to INVARIANT agent...</div></div>`;
            return;
        }

        const g = escapeHtml(String(s.posture?.grade ?? '—'));
        const gc = g !== '—' ? `grade-${g}` : '';
        const score = Number(s.posture?.score) || 0;
        const mode = escapeHtml(String(s.mode || ''));

        document.getElementById('app').innerHTML = `
        <div class="header">
            <div class="header-left">
                <div class="logo">INVARIANT</div>
                <span class="version">v1.0</span>
                <div class="mode-badge mode-${mode}">${mode}</div>
            </div>
            <div class="header-right">
                <div class="last-update">${new Date().toLocaleTimeString()}</div>
                <button class="btn" onclick="fetchAll()">↻ Refresh</button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab ${activeTab==='overview'?'active':''}" onclick="switchTab('overview')">Overview</div>
            <div class="tab ${activeTab==='findings'?'active':''}" onclick="switchTab('findings')">Findings</div>
            <div class="tab ${activeTab==='signals'?'active':''}" onclick="switchTab('signals')">Signals</div>
            <div class="tab ${activeTab==='analytics'?'active':''}" onclick="switchTab('analytics')">Analytics</div>
        </div>

        <div class="container">
            <!-- OVERVIEW PANEL -->
            <div class="panel ${activeTab==='overview'?'active':''}">
                <div class="posture-row">
                    <div class="grade-card">
                        <div class="grade-letter ${gc}">${g}</div>
                        <div class="grade-score">${score}/100</div>
                        <div class="grade-label">Security Posture</div>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card severity-critical">
                            <div class="stat-value">${s.findings?.critical??0}</div>
                            <div class="stat-label">Critical</div>
                        </div>
                        <div class="stat-card severity-high">
                            <div class="stat-value">${s.findings?.high??0}</div>
                            <div class="stat-label">High</div>
                        </div>
                        <div class="stat-card severity-total">
                            <div class="stat-value">${s.findings?.total??0}</div>
                            <div class="stat-label">Total Findings</div>
                        </div>
                        <div class="stat-card severity-blocked">
                            <div class="stat-value">${s.signals?.blocked??0}</div>
                            <div class="stat-label">Blocked (24h)</div>
                        </div>
                        <div class="stat-card severity-novel">
                            <div class="stat-value">${s.signals?.novel??0}</div>
                            <div class="stat-label">Novel Variants</div>
                        </div>
                    </div>
                </div>

                ${renderTimeline(state.timeline)}

                <div class="section">
                    <div class="section-header">
                        <div class="section-title">Recent Findings</div>
                        <div class="section-count">${state.findings.length} total</div>
                    </div>
                    <div class="table-wrap"><table>
                        <thead><tr><th>Sev</th><th>Title</th><th>Location</th><th>Type</th><th>RASP</th><th>Status</th><th>Seen</th></tr></thead>
                        <tbody>${renderFindings(state.findings.slice(0, 10))}</tbody>
                    </table></div>
                </div>
            </div>

            <!-- FINDINGS PANEL -->
            <div class="panel ${activeTab==='findings'?'active':''}">
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">All Findings</div>
                        <div style="display:flex;gap:6px">
                            <button class="btn btn-active" onclick="filterFindings('')">All</button>
                            <button class="btn" onclick="filterFindings('critical')">Critical</button>
                            <button class="btn" onclick="filterFindings('high')">High</button>
                            <button class="btn" onclick="filterFindings('medium')">Medium</button>
                        </div>
                    </div>
                    <div class="table-wrap"><table>
                        <thead><tr><th>Sev</th><th>Title</th><th>Location</th><th>Type</th><th>RASP</th><th>Status</th><th>Seen</th></tr></thead>
                        <tbody>${renderFindings(state.findings)}</tbody>
                    </table></div>
                </div>
            </div>

            <!-- SIGNALS PANEL -->
            <div class="panel ${activeTab==='signals'?'active':''}">
                ${renderTimeline(state.timeline)}
                <div class="section">
                    <div class="section-header">
                        <div class="section-title">Attack Signals</div>
                        <div class="section-count">${state.signals.length} recent</div>
                    </div>
                    <div class="table-wrap"><table>
                        <thead><tr><th>Sev</th><th>Action</th><th>Type</th><th>Path</th><th>Method</th><th>Novel</th><th>Time</th></tr></thead>
                        <tbody>${renderSignals(state.signals)}</tbody>
                    </table></div>
                </div>
            </div>

            <!-- ANALYTICS PANEL -->
            <div class="panel ${activeTab==='analytics'?'active':''}">
                ${renderDistribution(state.distribution, state.topPaths)}

                <div class="chart-card">
                    <div class="chart-title" style="margin-bottom:12px">Posture History</div>
                    <div style="display:flex;align-items:flex-end;gap:8px;height:80px">
                        ${(state.postureHistory || []).reverse().map(p => {
                            const g = String(p.grade || '');
                            const color = (g === 'A' ? 'var(--success)' : g === 'B' ? '#8BC34A' : g === 'C' ? 'var(--medium)' : g === 'D' ? 'var(--high)' : 'var(--critical)');
                            const scoreNum = Number(p.score) || 0;
                            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
                                <div style="font-size:10px;color:var(--text-muted);font-family:var(--mono)">${scoreNum}</div>
                                <div style="width:100%;height:${Math.max(4, scoreNum * 0.7)}px;background:${color};border-radius:3px;transition:height 0.3s"></div>
                            </div>`;
                        }).join('') || '<div class="empty" style="padding:20px">No posture history</div>'}
                    </div>
                </div>
            </div>
        </div>`;
    }

    function switchTab(tab) { activeTab = tab; render(); }
    async function filterFindings(sev) {
        const url = sev ? `${API}/findings?severity=${sev}&limit=100` : `${API}/findings?limit=100`;
        state.findings = await fetch(url).then(r => r.json());
        render();
    }

    fetchAll();
    setInterval(fetchAll, 10000);
    </script>
</body>
</html>
