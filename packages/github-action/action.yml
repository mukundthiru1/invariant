name: 'Invariant PR Scan'
description: 'Scan pull-request diffs with Invariant and optionally post inline review comments'
inputs:
  token:
    description: 'GitHub token used for PR API requests'
    required: false
  fail-on:
    description: "Failure mode: one of 'critical', 'high', 'medium', 'any', 'none'"
    required: false
    default: 'high'
  post-comments:
    description: 'Post inline review comments for findings'
    required: false
    default: 'true'
outputs:
  findings-count:
    description: 'Total number of findings returned by the PR scan'
  critical-count:
    description: 'Number of critical findings'
  high-count:
    description: 'Number of high findings'
runs:
  using: 'node20'
  main: 'dist/main.js'
